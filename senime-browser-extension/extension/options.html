<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Senibe 设置</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="page">
      <section class="panel">
        <p class="eyebrow">Senibe</p>
        <h1>浏览器码表设置</h1>
        <p class="lead">
          上传由 Senime 生成或缓存的字典二进制。后台脚本会在加载后全局初始化
          `senime-wasm`，页面里的输入框即可获得候选提示。
        </p>

        <label class="upload">
          <span>选择字典二进制</span>
          <input id="dict-file" type="file" accept=".bin,application/octet-stream" />
        </label>

        <div class="actions">
          <button id="reload" type="button">重新加载字典</button>
        </div>

        <p id="status" class="status">尚未检测到已加载的字典。</p>
      </section>
    </main>

    <script src="options.js"></script>
  </body>
</html>
